<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Vocabook - 로그인</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 50%, #f48fb1 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            min-height: 100vh;
        }

        /* 카드 */
        .login-card {
            background: #fff;
            padding: 48px 40px 40px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(233, 30, 99, 0.15);
            width: 380px;
            text-align: center;
        }

        /* 아이콘 원형 */
        .icon-circle {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #f48fb1, #e91e63);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 28px;
            box-shadow: 0 4px 16px rgba(233, 30, 99, 0.25);
        }

        .login-card h1 {
            font-size: 26px;
            margin-bottom: 6px;
            color: #333;
            font-weight: 700;
        }

        .login-card p.subtitle {
            font-size: 14px;
            color: #999;
            margin-bottom: 32px;
        }

        /* 폼 그룹 */
        .form-group {
            margin-bottom: 18px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: #666;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #f3e5f5;
            border-radius: 10px;
            font-size: 14px;
            font-family: 'Nunito', sans-serif;
            background: #fdf2f8;
            transition: all 0.25s ease;
        }

        .form-group input::placeholder {
            color: #cba4c3;
        }

        .form-group input:focus {
            outline: none;
            border-color: #e91e63;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(233, 30, 99, 0.1);
        }

        /* 에러 메시지 */
        .error-msg {
            background: #fce4ec;
            color: #c62828;
            font-size: 13px;
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-weight: 600;
        }

        /* 로그인 버튼 */
        .btn-login {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #f06292, #e91e63);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            font-family: 'Nunito', sans-serif;
            cursor: pointer;
            margin-top: 6px;
            transition: all 0.25s ease;
            box-shadow: 0 4px 14px rgba(233, 30, 99, 0.3);
        }

        .btn-login:hover {
            background: linear-gradient(135deg, #ec407a, #d81b60);
            box-shadow: 0 6px 20px rgba(233, 30, 99, 0.4);
            transform: translateY(-1px);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        /* 하단 장식 텍스트 */
        .footer-text {
            margin-top: 24px;
            font-size: 12px;
            color: #c9a0b8;
        }

        .footer-text span {
            color: #e91e63;
            font-weight: 700;
        }
    </style>
</head>
<body>

<div class="login-card">

    <!-- 아이콘 -->
    <div class="icon-circle">📖</div>

    <h1>Vocabook</h1>
    <p class="subtitle">영어 단어 학습을 시작하세요</p>

    <!-- 에러 메시지 -->
    <p class="error-msg" th:if="${error}" th:text="${error}"></p>

    <form th:action="@{/login}" method="post">
        <div class="form-group">
            <label for="username">아이디</label>
            <input type="text" id="username" name="username"
                   placeholder="아이디를 입력하세요" required autofocus>
        </div>

        <div class="form-group">
            <label for="password">비밀번호</label>
            <input type="password" id="password" name="password"
                   placeholder="비밀번호를 입력하세요" required>
        </div>

        <button type="submit" class="btn-login">로그인</button>
    </form>

    <p class="footer-text">Made with <span>♥</span> for learning</p>
</div>

</body>
</html>
